# This workflow will trigger for every change happening within pull_request event lifecycle.
on:
  pull_request:

jobs:
  commit-message-check:
    runs-on: ubuntu-22.04-htzhel1-ax42-a
    steps:
      - name: Checkout code
        uses: https://gitea.obmondo.com/Obmondo/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Install Cocogitto
        uses: https://gitea.obmondo.com/Obmondo/cocogitto-action@v4
        with:
          command: --version

      - name: Validate commit messages in PR
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          commits=$(git rev-list --reverse --no-merges "${BASE_SHA}..${HEAD_SHA}")

          if [ -z "${commits}" ]; then
            echo "No non-merge commits found in PR range ${BASE_SHA}..${HEAD_SHA}."
            exit 0
          fi

          cog check "${BASE_SHA}..${HEAD_SHA}"

  golangci-lint:
    runs-on: ubuntu-24.04-htzhel1-ax42-a
    needs: [security-code-scan]
    steps:
      - name: Checkout code
        uses: https://gitea.obmondo.com/Obmondo/checkout@v6.0.2

      - name: Setup Go
        uses: https://gitea.obmondo.com/Obmondo/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Golang CI lint
        uses: https://gitea.obmondo.com/Obmondo/golangci-lint-action@v9.2.0
        with:
          version: v2.11.4
          args: --timeout=5m --config=.golangci.yaml

  unit-tests:
    runs-on: ubuntu-22.04-htzhel1-ax42-a
    steps:
      - name: Checkout code
        uses: https://gitea.obmondo.com/Obmondo/checkout@v4.2.2

      - name: Setup Go
        uses: https://gitea.obmondo.com/Obmondo/setup-go@v5.5.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run unit tests
        run: go test -v -count=1 -covermode=atomic -coverprofile=coverage.out ./...

      - name: Show total coverage
        run: go tool cover -func=coverage.out

      - name: Check test coverage
        run: go run github.com/vladopajic/go-test-coverage/v2@latest --config=./testcoverage.yaml
