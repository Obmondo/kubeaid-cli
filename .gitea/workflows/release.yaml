name: goreleaser

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-22.04-htzhel1-ax42-a
    steps:
      - name: Checkout
        uses: https://gitea.obmondo.com/Obmondo/checkout@v6.0.2
        with:
          fetch-depth: 0

      # goreleaser shells out to `go` even with builds.skip=true (for module
      # path resolution), so Go must be on PATH.
      - name: Set up Go
        uses: https://gitea.obmondo.com/Obmondo/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Install Cocogitto
        uses: https://gitea.obmondo.com/Obmondo/cocogitto-action@v4
        with:
          command: get-version

      # Write outside the repo root so goreleaser's clean-tree check
      # doesn't trip on an untracked file in the workspace.
      - name: Generate release notes
        run: cog changelog --at ${{ github.ref_name }} -t full_hash > /tmp/release-notes.md

      - name: Run GoReleaser
        uses: https://gitea.obmondo.com/Obmondo/goreleaser-action@v6.4.0
        with:
          version: "~> v2"
          args: release --clean --parallelism 1 -f .goreleaser-gitea.yaml --release-notes /tmp/release-notes.md
        env:
          GITEA_TOKEN: ${{ secrets.GORELEASER_TOKEN }}
