name: goreleaser

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-22.04-htzhel1-ax42-a
    steps:
      - name: Checkout
        uses: https://gitea.obmondo.com/Obmondo/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: https://gitea.obmondo.com/Obmondo/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Install Cocogitto
        uses: https://gitea.obmondo.com/Obmondo/cocogitto-action@v4
        with:
          command: get-version

      - name: Generate Changelog + Release Notes
        run: |
          cog changelog -t full_hash > CHANGELOG.md
          cog changelog --at ${{ github.ref_name }} -t full_hash > GITEA_CHANGELOG.md

      - name: Run GoReleaser
        uses: https://gitea.obmondo.com/Obmondo/goreleaser-action@v6.4.0
        with:
          version: "~> v2"
          args: release --clean --parallelism 1 -f .goreleaser-gitea.yaml --release-notes GITEA_CHANGELOG.md
        env:
          GITEA_TOKEN: ${{ secrets.GORELEASER_TOKEN }}
