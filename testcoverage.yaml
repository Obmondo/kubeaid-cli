---
# https://github.com/vladopajic/go-test-coverage

profile: coverage.out

threshold:
  file: 0
  package: 0
  total: 0

override:
  - path: "^pkg/utils$"
    threshold: 37
  - path: "^pkg/utils/git$"
    threshold: 16
  - path: "^pkg/utils/kubernetes$"
    threshold: 62
  - path: "^pkg/utils/kubernetes/k3d$"
    threshold: 65
  - path: "^pkg/storageplanner/storageplan$"
    threshold: 67
  - path: "^pkg/config/parser$"
    threshold: 50
  - path: "^pkg/config/prompt$"
    threshold: 18
  - path: "^pkg/cloud/aws$"
    threshold: 74
  - path: "^pkg/cloud/aws/services$"
    threshold: 88
  - path: "^pkg/cloud/azure$"
    threshold: 57
  - path: "^pkg/cloud/hetzner$"
    threshold: 31

exclude:
  paths:
    - ^pkg/cloud/aws/services/fake$
