version: 2

project_name: kubeaid-cli

# Gitea releases publish only the changelog + release notes. Binaries are
# built and published to GitHub via .goreleaser-github.yaml; mirroring them
# to Gitea is redundant and wastes CI time.
builds:
  - skip: true

changelog:
  disable: true

release:
  extra_files:
    - glob: CHANGELOG.md

gitea_urls:
  api: https://gitea.obmondo.com/api/v1
  download: https://gitea.obmondo.com
  skip_tls_verify: false
