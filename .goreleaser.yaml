version: 2

project_name: kubeaid-cli
metadata:
  mod_timestamp: "{{ .CommitTimestamp }}"

env:
  - CGO_ENABLED=0
  - GO111MODULE=on

before:
  hooks:
    - go mod tidy

builds:
  - id: kubeaid-cli
    main: ./cmd/kubeaid-cli
    binary: kubeaid-cli
    goos: ["darwin", "linux"]
    goarch: ["amd64", "arm64"]
    ldflags:
      - -s -w
      - -X github.com/Obmondo/kubeaid-bootstrap-script/cmd/kubeaid-core/root/version.Version={{ .Tag }}
      - -X github.com/Obmondo/kubeaid-bootstrap-script/cmd/kubeaid-core/root/version.Commit={{ .ShortCommit }}
      - -X github.com/Obmondo/kubeaid-bootstrap-script/cmd/kubeaid-core/root/version.Date={{ .Date }}
  - id: kubeaid-storagectl
    main: ./cmd/kubeaid-storagectl
    binary: kubeaid-storagectl
    goos: ["linux"]
    goarch: ["amd64", "arm64"]
    ldflags:
      - -s -w
      - -X github.com/Obmondo/kubeaid-bootstrap-script/cmd/kubeaid-storagectl/root/version.Version={{ .Tag }}
      - -X github.com/Obmondo/kubeaid-bootstrap-script/cmd/kubeaid-storagectl/root/version.Commit={{ .ShortCommit }}
      - -X github.com/Obmondo/kubeaid-bootstrap-script/cmd/kubeaid-storagectl/root/version.Date={{ .Date }}

upx:
  - enabled: true

dist: build/goreleaser

changelog:
  disable: true

archives:
  - formats: [tar.gz]

    # This name template makes the OS and Arch compatible with the results of uname.
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}

    builds_info:
      group: root
      owner: root
      mode: 0755
      mtime: "{{ .CommitDate }}"

# TODO : github.com/Obmondo/homebrew-tab needs to be renamed to github.com/Obmondo/homebrew-tap.
# homebrew_casks:
#   - homepage: https://github.com/Obmondo/kubeaid-cli
#     description: |-
#       KubeAid CLI helps you operate KubeAid managed Kubernetes cluster lifecycle in a
#       GitOps native way
#     repository:
#       owner: Obmondo
#       name: homebrew-tap

nfpms:
  - file_name_template: >-
      {{- .PackageName }}_
      {{- .Tag }}_
      {{- .Os }}_
      {{- .Arch }}
      {{- if .Arm }}v{{ .Arm }}{{ end -}}
      {{- .ConventionalExtension }}
    vendor: Obmondo
    homepage: https://github.com/Obmondo/kubeaid-cli
    maintainer: Obmondo <ops@obmondo.com>
    description: |-
      KubeAid CLI helps you operate KubeAid managed Kubernetes cluster lifecycle in a
      GitOps native way
    license: AGPL3
    formats: ["deb", "rpm", "apk", "archlinux"]
    mtime: "{{ .CommitDate }}"
