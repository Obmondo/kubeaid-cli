name: CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  commit-message-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Cocogitto
        uses: cocogitto/cocogitto-action@v4
        with:
          command: --version

      - name: Validate commit messages in PR
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          commits=$(git rev-list --reverse --no-merges "${BASE_SHA}..${HEAD_SHA}")

          if [ -z "${commits}" ]; then
            echo "No non-merge commits found in PR range ${BASE_SHA}..${HEAD_SHA}."
            exit 0
          fi

          cog check "${BASE_SHA}..${HEAD_SHA}"

  golangci-lint:
    runs-on: ubuntu-latest
    needs: [go-build]
    container:
      image: golang:1.26.1-bookworm
    env:
      GOCACHE: /root/.cache/go-build
      GOMODCACHE: /go/pkg/mod
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Trust checkout directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Restore Go cache
        uses: actions/cache@v4
        with:
          path: |
            /go/pkg/mod
            /root/.cache/go-build
          key: go-Linux-1.26.1-${{ hashFiles('go.sum') }}

      - name: Golang CI lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          args: --timeout=10m --config=.golangci.yaml

  unit-tests:
    runs-on: ubuntu-latest
    needs: [go-build]
    container:
      image: golang:1.26.1-bookworm
    env:
      GOCACHE: /root/.cache/go-build
      GOMODCACHE: /go/pkg/mod
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Trust checkout directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Restore Go cache
        uses: actions/cache@v4
        with:
          path: |
            /go/pkg/mod
            /root/.cache/go-build
          key: go-Linux-1.26.1-${{ hashFiles('go.sum') }}

      - name: Run unit tests
        run: go test -v -count=1 -covermode=atomic -coverprofile=coverage.out ./...

      - name: Show total coverage
        run: go tool cover -func=coverage.out

      - name: Check test coverage
        run: go run github.com/vladopajic/go-test-coverage/v2@latest --config=./testcoverage.yaml

  go-build:
    runs-on: ubuntu-latest
    container:
      image: golang:1.26.1-bookworm
    env:
      GOCACHE: /root/.cache/go-build
      GOMODCACHE: /go/pkg/mod
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Trust checkout directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Restore Go cache
        uses: actions/cache@v4
        with:
          path: |
            /go/pkg/mod
            /root/.cache/go-build
          key: go-Linux-1.26.1-${{ hashFiles('go.sum') }}

      - name: Download Go modules
        run: go mod download

      - name: Build
        run: CGO_ENABLED=0 go build -v ./...

  check-k8s-eol-fresh:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Verify embedded K8s EOL snapshot
        run: make check-k8s-eol
