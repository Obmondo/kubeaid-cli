# yaml-language-server: $schema=https://raw.githubusercontent.com/aquasecurity/trivy/v0.70.0/schema/trivy-config.json

## Global options
cache-dir: $HOME/.cache/trivy
debug: false
insecure: false
quiet: false
exit-code: 1

format: table
table-mode:
  - summary
  - detailed
severity:
  - MEDIUM
  - HIGH
  - CRITICAL

scan:
  scanners:
    - vuln
    - secret
    - misconfig
  skip-dirs:
    - e2e/compose/configs

vulnerability:
  ignore-unfixed: true

pkg:
  types:
    - os
    - library
